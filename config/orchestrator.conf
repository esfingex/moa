[UI]
# Habilitar streaming de tokens en tiempo real
streaming = true
# Emulador de terminal para las ventanas de las IAs (terminator, gnome-terminal)
terminal_emulator = terminator

[MEMORY]
# Usar gramática Caveman (compresión de salida) en las IAs locales
use_caveman = true
# Usar la base de datos de Cavemem para RAG histórico comprimido
use_cavemem = true

[OLLAMA]
# URL base de la API de Ollama
base_url = http://localhost:11434/api/generate

[MODELS]
# Mapeo de capacidades (Ordenado por preferencia, separado por comas)
code = qwen2.5-coder:7b, deepseek-coder:6.7b, solaria-master
reasoning = phi4, qwen2.5:7b, solaria-master
chat = llama3.1:8b, mistral, solaria-master

[EXTERNAL_API]
# Claves para modelos externos (Cloud)
openai_key = 
anthropic_key = 
gemini_key = 
